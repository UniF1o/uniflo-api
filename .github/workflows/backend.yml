name: Backend CI/CD

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      SUPABASE_JWT_SECRET: ${{ secrets.SUPABASE_JWT_SECRET }}
      WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
      DELETE_WEBHOOK_SECRET: ${{ secrets.DELETE_WEBHOOK_SECRET }}
      SUPABASE_STORAGE_BUCKET: ${{ secrets.SUPABASE_STORAGE_BUCKET }}
      SENTRY_DSN: ""
      ENVIRONMENT: "test"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - run: ruff check .
      - run: pytest -v

  publish-spec:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      SUPABASE_JWT_SECRET: ${{ secrets.SUPABASE_JWT_SECRET }}
      SUPABASE_STORAGE_BUCKET: ${{ secrets.SUPABASE_STORAGE_BUCKET }}
      WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
      DELETE_WEBHOOK_SECRET: ${{ secrets.DELETE_WEBHOOK_SECRET }}
      FAKE_AUTOMATION: "true"
      SENTRY_DSN: ""
      ENVIRONMENT: "production"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Generate OpenAPI spec
        run: |
          python - <<'EOF'
          import json
          from app.main import app
          with open("openapi.json", "w") as f:
              json.dump(app.openapi(), f, indent=2)
          print("OpenAPI spec generated successfully")
          EOF
      - name: Validate OpenAPI spec
        run: |
          pip install openapi-spec-validator
          python -m openapi_spec_validator openapi.json
      - name: Commit spec to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add openapi.json
          git diff --staged --quiet || git commit -m "chore(api): update openapi.json [skip ci]"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git

  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Deploy to Render
        run: curl -fsS ${{ secrets.RENDER_DEPLOY_HOOK }}