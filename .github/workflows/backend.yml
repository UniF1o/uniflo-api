name: Backend CI/CD

on: [push] 

jobs: 
  test:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      SUPABASE_JWT_SECRET: ${{ secrets.SUPABASE_JWT_SECRET }}
      WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
      DELETE_WEBHOOK_SECRET: ${{ secrets.DELETE_WEBHOOK_SECRET }}
      SUPABASE_STORAGE_BUCKET: ${{ secrets.SUPABASE_STORAGE_BUCKET }}
      SENTRY_DSN: ""
      ENVIRONMENT: "test"
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: pytest tests/test_health.py -v
      - run: pytest tests/test_ping.py -v
      - run: pytest tests/test_auth_middleware.py -v
      - run: pytest tests/test_webhooks.py -v
      - run: pytest tests/test_auth_endpoints.py -v
      - run: pytest tests/test_profile_endpoints.py -v
      - run: pytest tests/test_documents_endpoints.py -v
  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v3
      - name: Deploy to Render
        run: curl ${{ secrets.RENDER_DEPLOY_HOOK }}